<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; }
    .header { font-weight: bold; font-size: 18px; margin-bottom: 12px; }
    .status { font-size: 12px; color: #666; margin-bottom: 16px; }
    input { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">Reckruit.ai Sourcing</div>
  <div class="status" id="status">Please enter your API Key to begin.</div>
  
  <label style="font-size: 11px; font-weight: 600;">API KEY</label>
  <input type="password" id="api-key" placeholder="rk_live_..." />
  
  <label style="font-size: 11px; font-weight: 600;">BACKEND URL</label>
  <input type="text" id="api-url" value="http://localhost:3001" />

  <button id="save-btn">Save Configuration</button>

  <div id="info" style="margin-top: 12px; font-size: 10px; color: #888; text-align: center;">
    Your data is synced directly to your private talent pool.
  </div>

  <script src="popup.js"></script>
</body>
</html>
