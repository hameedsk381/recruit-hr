version: '3.8'

services:
  # MongoDB for data persistence
  mongodb:
    image: mongo:7.0
    container_name: skillmatrix-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: skillmatrix123
      MONGO_INITDB_DATABASE: skillmatrix
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - skillmatrix-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7.2-alpine
    container_name: skillmatrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - skillmatrix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander (optional - for UI management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: skillmatrix-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - skillmatrix-network

  # Mongo Express (optional - for UI management)
  mongo-express:
    image: mongo-express:latest
    container_name: skillmatrix-mongo-ui
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: skillmatrix123
      ME_CONFIG_MONGODB_URL: mongodb://admin:skillmatrix123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - skillmatrix-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  skillmatrix-network:
    driver: bridge