server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support React Router and Backend Proxy
    location / {
        # First attempt to serve request as file, then as directory, 
        # then fall back to backend proxy for API calls
        try_files $uri $uri/ @backend;
    }

    location @backend {
        # Check if it's a sub-path that should be handled by React Router (no extension)
        # and doesn't match common API patterns. 
        # But actually, the safest way for this project is to proxy anything 
        # that isn't a physical file.
        
        proxy_pass http://backend:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # If the backend returns a 404, we might want to serve index.html 
        # for React Router routes that aren't API calls.
        # This is a bit tricky. Usually, API calls return JSON.
        # For now, let's assume the backend handles its own 404s.
        error_page 404 = /index.html;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
