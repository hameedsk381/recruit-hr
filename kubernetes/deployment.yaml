apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruit-hr-platform
  labels:
    app: recruit-hr
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recruit-hr
  template:
    metadata:
      labels:
        app: recruit-hr
    spec:
      containers:
      - name: recruit-hr
        image: your-registry/recruit-hr:latest
        ports:
        - containerPort: 3001
        env:
        - name: HR_TOOLS_PORT
          value: "3001"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: recruit-hr-secrets
              key: mongodb_uri
        - name: REDIS_URL
          value: "redis://redis-master:6379"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/ready
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recruit-hr-service
spec:
  selector:
    app: recruit-hr
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: LoadBalancer
